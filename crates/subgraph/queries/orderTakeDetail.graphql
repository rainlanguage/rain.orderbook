query OrderTakeDetailQuery($id: Bytes!) {
  trade(id: $id) {
    tradeEvent {
      transaction {
        id
        from
      }
    }
    outputVaultBalanceChange {
      amount
      vault {
        token {
          id
          address
          name
          symbol
          decimals
        }
      }
    }
    order {
      orderHash
    }
    raindex {
      id
    }
    inputVaultBalanceChange {
      vault {
        token {
          id
          address
          name
          symbol
          decimals
        }
      }
      amount
    }
  }
}